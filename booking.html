    <!--Booking Form-->
    <section class="container py-5 booking-form-container" style="max-width:600px; margin-top:50px;">
        <h2 class="text-center mb-4 booking-title">Book Your Interior Design Service</h2>

        <form class="booking-form">
            <div class="mb-3">
                <input type="text" class="form-control booking-name" placeholder="Your Name" required>
            </div>

            <div class="mb-3">
                <input type="email" class="form-control booking-email" placeholder="Your Email" required>
            </div>

            <div class="mb-3">
                <select class="form-control booking-service" required>
                    <option value="" disabled selected>Select Service</option>
                    <option value="Residential Design">Residential Design</option>
                    <option value="Office Design">Office Design</option>
                    <option value="Commercial Design">Commercial Design</option>
                </select>
            </div>

            <div class="mb-3">
                <select class="form-control booking-location" required>
                    <option value="" disabled selected>Property Location</option>
                    <option value="Penang">Penang</option>
                    <option value="Kuala Lumpur">Kuala Lumpur</option>
                     <option value="Selangor">Selangor</option>
                    <option value="Johor">Johor</option>
                </select>
            </div>

            <button type="button" class="btn booking-preview-btn">Book Now!</button>
        </form>
    </section>

    <!-- Booking Preview Popup -->
    <div class="booking-popup-overlay">
        <div class="booking-popup">
            <h3>Booking Preview</h3>
            <p class="popup-name"></p>
            <p class="popup-email"></p>
            <p class="popup-service"></p>
            <p class="popup-location"></p>
            <button class="popup-close-btn">Close</button>
        </div>
    </div>
